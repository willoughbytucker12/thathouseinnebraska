name: Run tabubu_nguyen2022 over Nguyen PDSTSP set

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - restore-branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build JSON matrix from pdstsp-upload/instances/tsplib/{eil101,gr120,pr152,gr229}-*.txt
        id: set-matrix
        run: |
          items=()
          for prefix in eil101 gr120 pr152 gr229; do
            for f in pdstsp-upload/instances/tsplib/${prefix}-*.txt; do
              if [ -f "$f" ]; then
                base=$(basename "$f" .txt)
                file=$(printf '%s' "$f" | sed 's/"/\\"/g')
                base=$(printf '%s' "$base" | sed 's/"/\\"/g')
                items+=("{\"file\":\"$file\",\"base\":\"$base\"}")
              fi
            done
          done
          if [ ${#items[@]} -eq 0 ]; then
            echo "No instance files found"; exit 1
          fi
          matrix_json="$(printf '%s,' "${items[@]}")"
          matrix_json="[${matrix_json%,}]"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build:
    name: Build solver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compile solver
        run: |
          g++ -O3 -std=c++20 tabubu_nguyen2022.cpp -o tabubu_nguyen2022

      - name: Upload solver binary
        uses: actions/upload-artifact@v4
        with:
          name: solver-nguyen-bin
          path: tabubu_nguyen2022
          retention-days: 1

  run-instance:
    name: Run ${{ matrix.base }}
    needs: [prepare, build]
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 60
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download solver
        uses: actions/download-artifact@v4
        with:
          name: solver-nguyen-bin

      - name: Make executable
        run: chmod +x tabubu_nguyen2022

      - name: Run solver on instance
        timeout-minutes: 355
        run: |
          mkdir -p outputs
          ./tabubu_nguyen2022 "${{ matrix.file }}" > "outputs/${{ matrix.base }}.log" 2>&1 || true

      - name: Collect outputs
        if: always()
        run: |
          if [[ -f output_solution_best.txt ]]; then
            cp output_solution_best.txt "outputs/${{ matrix.base }}_best.txt"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base }}-nguyen-results
          path: |
            outputs/${{ matrix.base }}.log
            outputs/${{ matrix.base }}_best.txt
            outputs/${{ matrix.base }}.log
          if-no-files-found: warn

  collect-all:
    name: Collect and compress all artifacts
    runs-on: ubuntu-latest
    if: always()
    needs: run-instance
    timeout-minutes: 60
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifact dirs:"
          ls -la all_artifacts || true

      - name: Consolidate into summary directory
        run: |
          rm -rf summary || true
          mkdir -p summary
          for a in all_artifacts/*; do
            name=$(basename "$a")
            mkdir -p "summary/$name"
            find "$a" -type f -name '*_best.txt' -exec cp {} "summary/$name/" \; || true
          done

      - name: Create final compressed summary
        run: |
          tar -czf tabubu_saleu_all_instances_summary.tar.gz -C summary .

      - name: Upload consolidated summary
        uses: actions/upload-artifact@v4
        with:
          name: tabubu_saleu_all_instances_summary
          path: tabubu_saleu_all_instances_summary.tar.gz
