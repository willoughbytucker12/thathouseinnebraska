name: Run tabubu_saleu over Saleu VRP set

on:
  workflow_dispatch:
  push:
    branches:
    #  - main
      - restore-branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix of 40 runs
        id: set-matrix
        run: |
          items=()
          for i in $(seq 1 40); do
            items+=("{\"file\":\"saleu-2022/saleu-2022/X-n139-k10.vrp\",\"base\":\"X-n139-k10\",\"run_id\":$i}")
          done
          matrix_json="$(printf '%s,' "${items[@]}")"
          matrix_json="[${matrix_json%,}]"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build:
    name: Build solver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compile solver
        run: |
          g++ -O3 -std=c++20 tabubu_saleu.cpp -o tabubu_saleu

      - name: Upload solver binary
        uses: actions/upload-artifact@v4
        with:
          name: solver-saleu-bin
          path: tabubu_saleu
          retention-days: 1

  run-instance:
    name: Run instance ${{ matrix.base }} R${{ matrix.run_id }}
    needs: [prepare, build]
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 40
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download solver
        uses: actions/download-artifact@v4
        with:
          name: solver-saleu-bin

      - name: Make executable
        run: chmod +x tabubu_saleu

      - name: Run tabubu_saleu on instance
        timeout-minutes: 355
        run: |
          mkdir -p outputs
          ./tabubu_saleu "${{ matrix.file }}" > "outputs/${{ matrix.base }}_R${{ matrix.run_id }}.log" 2>&1 || true

      - name: Prepare outputs
        if: always()
        run: |
          if [[ -f output_solution_best.txt ]]; then
            cp output_solution_best.txt "outputs/${{ matrix.base }}_R${{ matrix.run_id }}_best.txt"
          fi

      - name: Upload per-instance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base }}-R${{ matrix.run_id }}-tabubu-saleu-results
          path: |
            outputs/${{ matrix.base }}_R${{ matrix.run_id }}_best.txt
            outputs/${{ matrix.base }}_R${{ matrix.run_id }}.log
          if-no-files-found: warn

  collect-all:
    name: Collect and compress all artifacts
    runs-on: ubuntu-latest
    if: always()
    needs: run-instance
    timeout-minutes: 60
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifact dirs:"
          ls -la all_artifacts || true

      - name: Consolidate into summary directory
        run: |
          rm -rf summary || true
          mkdir -p summary
          for a in all_artifacts/*; do
            name=$(basename "$a")
            mkdir -p "summary/$name"
            find "$a" -type f -name '*_best.txt' -exec cp {} "summary/$name/" \; || true
          done

      - name: Create final compressed summary
        run: |
          tar -czf tabubu_saleu_all_instances_summary.tar.gz -C summary .

      - name: Upload consolidated summary
        uses: actions/upload-artifact@v4
        with:
          name: tabubu_saleu_all_instances_summary
          path: tabubu_saleu_all_instances_summary.tar.gz
