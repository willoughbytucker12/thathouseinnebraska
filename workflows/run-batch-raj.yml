name: Run tabubu_raj over TSPLIB instances (truck/drone sweep)

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - restore-branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build solver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compile solver
        run: |
          g++ -O3 -std=c++20 tabubu_raj.cpp -o tabubu_raj

      - name: Upload solver binary
        uses: actions/upload-artifact@v4
        with:
          name: solver-raj-bin
          path: tabubu_raj
          retention-days: 1

  run-instance:
    name: Run ${{ matrix.base }} T${{ matrix.num_truck }} D${{ matrix.num_drone }}
    needs: build
    strategy:
      matrix:
        base:
          - att48-80-2-1-1
          - berlin52-80-2-1-1
          - eil101-80-2-1-1
          - gr120-80-2-1-1
          - gr229-80-2-1-1
          - pr152-80-2-1-1
        num_truck: [2, 3]
        num_drone: [2, 4, 6]
      max-parallel: 36
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download solver
        uses: actions/download-artifact@v4
        with:
          name: solver-raj-bin

      - name: Make executable
        run: chmod +x tabubu_raj

      - name: Run solver on instance
        timeout-minutes: 355
        run: |
          mkdir -p outputs
          ./tabubu_raj "pdstsp-upload/instances/tsplib/${{ matrix.base }}.txt" \
            --num-truck=${{ matrix.num_truck }} \
            --num-drone=${{ matrix.num_drone }} \
            > "outputs/${{ matrix.base }}_T${{ matrix.num_truck }}_D${{ matrix.num_drone }}.log" 2>&1 || true

      - name: Collect outputs
        if: always()
        run: |
          if [[ -f output_solution_best.txt ]]; then
            cp output_solution_best.txt "outputs/${{ matrix.base }}_T${{ matrix.num_truck }}_D${{ matrix.num_drone }}_best.txt"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base }}-T${{ matrix.num_truck }}-D${{ matrix.num_drone }}-raj-results
          path: |
            outputs/${{ matrix.base }}_T${{ matrix.num_truck }}_D${{ matrix.num_drone }}.log
            outputs/${{ matrix.base }}_T${{ matrix.num_truck }}_D${{ matrix.num_drone }}_best.txt
          if-no-files-found: warn

  collect-all:
    name: Collect and compress all artifacts
    runs-on: ubuntu-latest
    if: always()
    needs: run-instance
    timeout-minutes: 60
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifact dirs:"
          ls -la all_artifacts || true

      - name: Consolidate into summary directory
        run: |
          rm -rf summary || true
          mkdir -p summary
          for a in all_artifacts/*; do
            name=$(basename "$a")
            mkdir -p "summary/$name"
            find "$a" -type f -name '*_best.txt' -exec cp {} "summary/$name/" \; || true
          done

      - name: Generate results CSV
        run: |
          python3 - <<'EOF'
          import os, re, csv, glob

          rows = []
          for best_file in sorted(glob.glob('all_artifacts/**/*_best.txt', recursive=True)):
              fname = os.path.basename(best_file)
              m = re.match(r'^(.+)_T(\d+)_D(\d+)_best\.txt$', fname)
              if not m:
                  continue
              instance, num_truck, num_drone = m.group(1), m.group(2), m.group(3)

              with open(best_file) as f:
                  content = f.read()

              def find(pattern):
                  r = re.search(pattern, content)
                  return r.group(1) if r else ''

              improved  = find(r'Improved solution cost: ([\d.]+)')
              mean_cost = find(r'Mean solution cost: ([\d.]+)')
              worst_cost = find(r'Worst solution cost: ([\d.]+)')
              initial_cost = find(r'Initial solution cost: ([\d.]+)')
              elapsed   = find(r'Mean elapsed time: ([\d.]+)')
              feasibility = find(r'Final solution feasibility: (\w+)')
              makespan  = find(r'Makespan=([\d.]+)')
              deadline_viol = find(r'Deadline violation=([\d.]+)')
              energy_viol   = find(r'Energy violation=([\d.]+)')
              capacity_viol = find(r'Capacity violation=([\d.]+)')
              truck_dist = find(r'Total truck distance: ([\d.]+)')
              drone_dist = find(r'Total drone distance: ([\d.]+)')

              truck_matches = re.findall(r'Truck \d+: ([^|]+)\|Truck Time: ([\d.]+)', content)
              drone_matches = re.findall(r'Drone \d+: ([^|]+)\|Drone Time: ([\d.]+)', content)

              truck_paths = [r[0].strip() for r in truck_matches]
              drone_paths = [r[0].strip() for r in drone_matches]
              truck_times = [float(r[1]) for r in truck_matches]
              drone_times = [float(r[1]) for r in drone_matches]

              rows.append({
                  'Problem':            instance,
                  'num_truck':          num_truck,
                  'num_drone':          num_drone,
                  'initial cost':       initial_cost,
                  'final cost':         improved,
                  'mean cost':          mean_cost,
                  'worst cost':         worst_cost,
                  'makespan':           makespan,
                  'elapsed time (s)':   elapsed,
                  'feasibility':        feasibility,
                  'deadline violation': deadline_viol,
                  'energy violation':   energy_viol,
                  'capacity violation': capacity_viol,
                  'truck routes':       str(truck_paths),
                  'drone routes':       str(drone_paths),
                  'highest truck time': max(truck_times) if truck_times else '',
                  'highest drone time': max(drone_times) if drone_times else '',
                  'truck distance':     truck_dist,
                  'drone distance':     drone_dist,
              })

          rows.sort(key=lambda r: (r['Problem'], int(r['num_truck']), int(r['num_drone'])))

          out = 'results.csv'
          with open(out, 'w', newline='') as f:
              if rows:
                  writer = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  writer.writeheader()
                  writer.writerows(rows)
          print(f"Generated {out} with {len(rows)} rows")
          EOF

      - name: Create final compressed summary
        run: |
          cp results.csv summary/ || true
          tar -czf tabubu_raj_all_instances_summary.tar.gz -C summary .

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: tabubu_raj_results_csv
          path: results.csv

      - name: Upload consolidated summary
        uses: actions/upload-artifact@v4
        with:
          name: tabubu_raj_all_instances_summary
          path: tabubu_raj_all_instances_summary.tar.gz
